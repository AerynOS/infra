syntax = "proto3";

package summit;

import "common.proto";
import "options.proto";
import "google/protobuf/empty.proto";

message RetryRequest {
  uint64 task_id = 1;
}

message CancelRequest {
  uint64 task_id = 1;
}

message BuilderStream {
  message Incoming {
    oneof event {
      BuilderStatus status = 1;
      uint64 build_started = 2;
      BuildLog build_log = 3;
      BuildFinished build_succeeded = 4;
      uint64 build_failed = 5;
      BuilderBusy busy = 6;
      uint64 upload_failed = 7;
    }
  }
  
  message Outgoing {
    oneof event {
      StartBuild start_build = 1;
      UploadBuild upload_build = 2;
      google.protobuf.Empty cancel_build = 3;
    }
  }

  message BuilderStatus {
    // True if the builder is building
    bool building = 1;
    // Current task being built
    // 
    // Not set if builder is busy building a task
    // for another instance of summit
    optional uint64 task_id = 2;
  }

  message StartBuild {
    uint64 task_id = 1;
    string uri = 2;
    string commit_ref = 3;
    string relative_path = 4;
    string build_architecture = 5;
    repeated common.Remote remotes = 6;
  }

  message BuildLog {
    bytes chunk = 1;
  }

  message BuildFinished {
    uint64 task_id = 1;
    repeated common.Collectable collectables = 2;
  }

  message UploadBuild {
    BuildFinished build = 1;
    string token = 2;
    string uri = 3;
  }

  message BuilderBusy {
    uint64 requested_task_id = 1;
    // Not set if builder is busy building a task
    // for another instance of summit
    optional uint64 in_progress_task_id = 2;
  }
}

message RepositoryManagerStream {
  message Incoming {
    oneof event {
      Details details = 1;
      UploadToken upload_token = 2;
      uint64 import_succeeded = 3;
      uint64 import_failed = 4;
    }
  }

  message Outgoing {
    oneof event {
      RequestUploadToken request_upload_token = 1;
    }
  }

  message Details {
    string grpc_uri = 1;
  }

  message RequestUploadToken {
    uint64 task_id = 1;
    repeated common.Collectable collectables = 2;
    string builder_id = 3;
    string builder_public_key = 4;
  }
  
  message UploadToken {
    uint64 task_id = 1;
    repeated common.Collectable collectables = 2;
    string token = 3;
  }
}

service SummitService {
  // Bidirectional stream between summit & builder
  rpc Builder(stream BuilderStream.Incoming) returns (stream BuilderStream.Outgoing) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "ConnectBuilderStream";
  }

  // Bidirectional stream between summit & repository manager
  rpc RepositoryManager(stream RepositoryManagerStream.Incoming) returns (stream RepositoryManagerStream.Outgoing) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "ConnectRepositoryManagerStream";
  }

  // Commands

  rpc Retry(RetryRequest) returns (google.protobuf.Empty) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "RetryTask";
  }
  rpc Cancel(CancelRequest) returns (google.protobuf.Empty) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "CancelTask";
  }
  rpc Refresh(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "Refresh";
  }
  rpc Pause(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "Pause";
  }
  rpc Resume(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "Resume";
  }
}
