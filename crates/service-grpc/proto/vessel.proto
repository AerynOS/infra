syntax = "proto3";

package vessel;

import "options.proto";
import "google/protobuf/empty.proto";

message UploadRequest {
  bytes chunk = 1;
}

message UpdateStreamRequest {
  string channel = 1;
  Stream stream = 2;
  string version = 3;
}

message AddTagRequest {
  string channel = 1;
  string tag = 2;
  string history = 3;
}

message RemoveTagRequest {
  string channel = 1;
  string tag = 2;
}

enum Stream {
  STREAM_UNKNOWN = 0;
  STREAM_VOLATILE = 1;
  STREAM_UNSTABLE = 2;
}

message CommandResponse {
  bool success = 1;
  optional string error = 2;
}

message UpgradeFormatRequest {
  string channel = 1;
  UpgradeFormat format = 2;

}

message UpgradeFormat {
  oneof format {
    /// Upgrade from legacy to v0
    UpgradeFormatLegacy legacy = 1;
  }
}

// Upgrade from legacy to v0
message UpgradeFormatLegacy {
  // Tag to create on `legacy` from `volatile`
  // before upgrading `volatile` to `v0`
  string tag_name = 1;
}

service VesselService {
  rpc Upload(stream UploadRequest) returns (google.protobuf.Empty) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "UploadPackage";
  }

  // Commands
  
  rpc UpdateStream(UpdateStreamRequest) returns (CommandResponse) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "UpdateStream";
  }
  rpc AddTag(AddTagRequest) returns (CommandResponse) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "AddTag";
  }
  rpc RemoveTag(RemoveTagRequest) returns (CommandResponse) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "RemoveTag";
  }
  rpc UpgradeFormat(UpgradeFormatRequest) returns (CommandResponse) {
    option (options.flags) = "ACCESS_TOKEN | NOT_EXPIRED";
    option (options.perm) = "UpgradeFormat";
  }
}
